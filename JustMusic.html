<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor MP3 GitHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background-color: #161b22;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #30363d;
            width: 350px;
        }
        h2 {
            margin-top: 0;
            color: #58a6ff;
            font-size: 1.2rem;
        }
        p {
            font-size: 0.9rem;
            color: #8b949e;
            margin-bottom: 20px;
        }
        audio {
            width: 100%;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h2>Reproductor de Audio</h2>
        <p id="track-title">Escuchando desde GitHub</p>
        
        <!-- REEMPLAZA EL LINK DE ABAJO EN EL ATRIBUTO src -->
        <audio controls>
            <source src="https://github.com/IsabelGulloso/BlackList/raw/refs/heads/main/BLACKLIST/Music/Main%20Menu/CITY%OF%ANGELS.mp3" type="audio/mpeg">
            Tu navegador no soporta el elemento de audio.
        </audio>
    </div>

</body>
</html>
