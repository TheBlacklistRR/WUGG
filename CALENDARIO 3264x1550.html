
<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>CALENDARIO</title>
<style>
:root{

    /*==============================
        CONFIGURACIÓN
    ==============================*/

    /* Hora */
    --hora-size:48px;

    /* Fecha */
    --fecha-size:24px;

    /* Espacio entre meses */
    --gap-meses:10px;

    /* Cuadro del mes */
    --mes-padding:25px;

    /* Nombre del mes */
    --mes-titulo:30px;

    /* Letras L M M J V S D */
    --dias-size:25px;
    --dias-padding:4px;

    /* Números */
    --numero-size:25px;
    --numero-padding:4px;

    /* Día actual (verde) */
    --today-size:35px;
    --today-width:50px;
    --today-height:50px;
    --today-radius:5px;

/* Día seleccionado (rojo) */
--selected-size:35px;
--selected-width:50px;
--selected-height:50px;
--selected-radius:5px;
--selected-color:#d00000;

/* Día siguiente (verde devolución) */
--next-size:35px;
--next-width:50px;
--next-height:50px;
--next-radius:5px;
--next-color:#00cc44;

}
body{margin:0;background:#111;color:#fff;font-family:Arial}
#top{text-align:center;padding:10px}
#hora{
    font-size:var(--hora-size);
    color:#0f8;
}
#fecha{
    font-size:var(--fecha-size);
}
#cal{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:var(--gap-meses);
    padding:10px;
}
.month{
    border:1px solid #555;
    padding:var(--mes-padding);
}
.month table{
    width:100%;
    border-collapse:collapse;
}
.month h3{
    text-align:center;
    font-size:var(--mes-titulo);
    margin:0 0 8px 0;
}
th{
    text-align:center;
    font-size:var(--dias-size);
    padding:var(--dias-padding);
}
td{
    position:relative;
    text-align:center;
    font-size:var(--numero-size);
    padding:var(--numero-padding);
}
.today{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:var(--today-width);
    height:var(--today-height);

    display:flex;
    justify-content:center;
    align-items:center;

    background:#0a0;
    color:#fff;

    border-radius:var(--today-radius);

    font-size:var(--today-size);

    pointer-events:none;

}

.selected{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:var(--selected-width);
    height:var(--selected-height);

    display:flex;
    justify-content:center;
    align-items:center;

    background:var(--selected-color);
    color:#fff;

    border-radius:var(--selected-radius);

    font-size:var(--selected-size);

    pointer-events:none;

}

.nextday{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:var(--next-width);
    height:var(--next-height);

    display:flex;
    justify-content:center;
    align-items:center;

    background:var(--next-color);
    color:#fff;

    border-radius:var(--next-radius);

    font-size:var(--next-size);

    pointer-events:none;

}
.debugP .click{outline:2px dashed red}
.debugB *{outline:1px solid cyan}

html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;}
#pantalla{
position:absolute;
width:3264px;
height:1550px;
top:50%;
left:50%;
transform-origin:center center;
overflow:hidden;
}
</style>
</head>
<body>
<div id="pantalla">
<div id="top" class="click"><div id="hora"></div><div id="fecha"></div></div>
<div id="cal" class="click"></div>

<script>
const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const dias=["L","M","M","J","V","S","D"];
let fechaSeleccionada=null;
function draw(){
 const now=new Date();
 hora.textContent=now.toLocaleTimeString();
 fecha.textContent=now.toLocaleDateString(undefined,{weekday:"long",year:"numeric",month:"long",day:"numeric"});
 cal.innerHTML="";
 const y=now.getFullYear();
 for(let m=0;m<12;m++){
 let d=document.createElement("div");d.className="month click";
 d.innerHTML="<h3>"+meses[m]+"</h3>";
 let t=document.createElement("table");
 let tr=document.createElement("tr");dias.forEach(x=>{let th=document.createElement("th");th.textContent=x;tr.appendChild(th)});t.appendChild(tr);
 let first=new Date(y,m,1);let start=(first.getDay()+6)%7;let days=new Date(y,m+1,0).getDate();
 let r=document.createElement("tr");
 for(let i=0;i<start;i++)r.appendChild(document.createElement("td"));
 for(let day=1;day<=days;day++){
 if(r.children.length==7){t.appendChild(r);r=document.createElement("tr")}
let td=document.createElement("td");
const fechaCelda=new Date(y,m,day);
td.dataset.fecha=fechaCelda.toISOString();


let numero=document.createElement("span");
numero.textContent=day;
numero.style.position="relative";
numero.style.zIndex="2";

const estaHoy=
day==now.getDate() &&
m==now.getMonth();

const estaSeleccionado=
fechaSeleccionada &&
fechaCelda.toISOString()==fechaSeleccionada;

let mañana=null;

if(fechaSeleccionada){

    mañana=new Date(fechaSeleccionada);
    mañana.setDate(mañana.getDate()+1);

}

const esSiguiente=
mañana &&
fechaCelda.toDateString()==mañana.toDateString();

if(estaHoy){

    let f=document.createElement("span");
    f.className="today";
    td.appendChild(f);

}

if(estaSeleccionado){

    let f=document.createElement("span");
    f.className="selected";
    td.appendChild(f);

}

if(esSiguiente){

    let f=document.createElement("span");
    f.className="nextday";
    td.appendChild(f);

}

td.appendChild(numero);
td.onclick=function(){

    fechaSeleccionada=fechaCelda.toISOString();

    draw();

};
r.appendChild(td);
 }
 while(r.children.length<7)r.appendChild(document.createElement("td"));
 t.appendChild(r);d.appendChild(t);cal.appendChild(d);
 }
}
draw();setInterval(draw,1000);
document.addEventListener("keydown",e=>{
 if(e.key.toLowerCase()=="p")document.body.classList.toggle("debugP");
 if(e.key.toLowerCase()=="b")document.body.classList.toggle("debugB");
});
</script>
</div>

<script>
function ajustarEscala(){
 const baseW=3264, baseH=1550;
 const s=Math.min(window.innerWidth/baseW,window.innerHeight/baseH);
 const p=document.getElementById('pantalla');
 p.style.transform=`translate(-50%,-50%) scale(${s})`;
}
window.addEventListener('resize',ajustarEscala);
window.addEventListener('DOMContentLoaded',ajustarEscala);
</script>
</body>
</html>
